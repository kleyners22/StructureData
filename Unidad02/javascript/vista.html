<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Practicando JavaScript</title>
</head>
<body>

    <h1>Ejemplo JavaScript</h1>

    <button onclick="mostrarMensaje()">
        Presiónar
    </button>

    <p id="mensaje"></p>

    <script>
        function mostrarMensaje() {
            document.getElementById("mensaje").textContent = "Practicando en JavaScript";
        }
    </script>

</body>
</html>
